name: Build Tauri App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          # 桌面端
          - platform: macos-latest
            os: aarch64-apple-darwin
            label: macos-arm64
          - platform: ubuntu-latest
            os: x86_64-unknown-linux-gnu
            label: linux-x64
          - platform: windows-latest
            os: x86_64-pc-windows-msvc
            label: windows-x64
          # 移动端（iOS 暂时注释，需要 Apple 开发者证书后启用）
          # - platform: macos-14
          #   os: aarch64-apple-ios
          #   label: ios
          #   needs_xcode: true
          - platform: ubuntu-latest
            os: aarch64-linux-android
            label: android

    runs-on: ${{ matrix.platform }}

    steps:
      # 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 安装 Rust 工具链（移动端需要额外 target）
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ (matrix.os == 'aarch64-apple-ios' && 'aarch64-apple-ios') || (matrix.os == 'aarch64-linux-android' && 'aarch64-linux-android') || '' }}

      # Linux：安装 GTK/WebKit 等系统依赖
      - name: Install system dependencies (Linux)
        if: matrix.os == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      # Android：安装 NDK
      - name: Install Android NDK
        if: matrix.os == 'aarch64-linux-android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          local-cache: true

      # 配置 Rust 缓存，加速构建
      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            vue3-project/src-tauri/target/
          key: tauri-${{ matrix.label }}-${{ hashFiles('vue3-project/src-tauri/Cargo.lock') }}
          restore-keys: |
            tauri-${{ matrix.label }}-

      # iOS：配置 Xcode
      - name: Setup Xcode (iOS)
        if: matrix.needs_xcode == true
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vue3-project/package-lock.json

      # 安装前端依赖并构建前端（自动读取 .env.production）
      - name: Install frontend dependencies and build
        working-directory: vue3-project
        run: npm ci && npm run build

      # 准备桌面端签名密钥
      - name: Setup Tauri signing key
        if: matrix.needs_xcode != true && matrix.os != 'aarch64-linux-android'
        env:
          TAURI_PRIVATE_KEY_CONTENT: ${{ secrets.TAURI_PRIVATE_KEY }}
        working-directory: vue3-project
        run: |
          mkdir -p "$HOME/.tauri"
          echo "$TAURI_PRIVATE_KEY_CONTENT" > "$HOME/.tauri/com.zhaishis.dynamic.key"

      # 准备 Android 签名密钥库（dynamic.jks，别名 dyci）
      - name: Setup Android keystore
        if: matrix.os == 'aarch64-linux-android'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > /tmp/dynamic.jks

      # 构建 Tauri 应用
      - name: Build Tauri app (${{ matrix.label }})
        working-directory: vue3-project
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          # Android 签名配置
          ANDROID_NDK_HOME: ${{ matrix.os == 'aarch64-linux-android' && env.ANDROID_NDK_LATEST_HOME || '' }}
          TAURI_ANDROID_KEYSTORE_PATH: ${{ matrix.os == 'aarch64-linux-android' && '/tmp/dynamic.jks' || '' }}
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: dyci
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: npm run tauri build -- --target ${{ matrix.os }}

      # 上传构建产物
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yueshe-${{ matrix.label }}-${{ github.sha }}
          path: |
            vue3-project/src-tauri/target/release/bundle/*.{dmg,app,deb,AppImage,msi,exe,nupkg,aab,apk,ipa}
          if-no-files-found: warn
          retention-days: 30

  release:
    needs: build-tauri
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
